name: Prerelease to Nuget

on:
  push:
    branches: [ gdst-2-0-0 ]
    paths:
      - 'CSharp/**'
      - '.github/workflows/prerelease-nuget.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./CSharp
    timeout-minutes: 5
    env:
      VERSION: 2.0.0-beta.${{ github.run_number }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
    - name: Build (Debug) and Test
      run: |
        dotnet build -c Debug /p:Version=${{ env.VERSION }}
        dotnet test -c Debug --no-build --filter "TestCategory=UnitTest"
    - name: Pack (Release)
      run: dotnet pack -c Release /p:Version=${{ env.VERSION }} --output .
    - name: Push to NuGet
      run: dotnet nuget push "*.nupkg" --api-key ${{ secrets.nuget_api_key }} --source https://api.nuget.org/v3/index.json